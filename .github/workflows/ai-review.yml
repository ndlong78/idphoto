name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'src/**/*.js'
      - 'tests/**/*.js'

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Skip Anthropic review
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## AI Code Review

            ⚠️ Tính năng AI review dùng `ANTHROPIC_API_KEY` đang được tắt theo cấu hình dự án.
